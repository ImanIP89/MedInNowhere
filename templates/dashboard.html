<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedInNowhere ۳.۱ | داشبورد سلامت</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#4cff8d">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        body { background: #1e1e1e; color: #e0e0e0; font-family: Tahoma; margin: 0; }
        .navbar { background:#121212; padding:15px 30px; display:flex; justify-content:space-between; border-bottom:1px solid #444; }
        .navbar a { color:#ccc; text-decoration:none; margin-left:20px; }
        .navbar a:hover { color:#4cff8d; }
        .container { max-width:1200px; margin:40px auto; padding:20px; }
        h1 { color:#4cff8d; }
        .stats-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:15px; margin-bottom:30px; }
        .stat-card { background:#2a2a2a; border:1px solid #444; border-radius:10px; padding:20px; text-align:center; }
        .stat-card .number { font-size:36px; color:#4cff8d; font-weight:bold; }
        .stat-card .label { color:#aaa; font-size:14px; margin-top:5px; }
        .charts-grid { display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-bottom:30px; }
        .chart-card { background:#2a2a2a; border:1px solid #444; border-radius:10px; padding:20px; }
        .chart-card h3 { color:#4cff8d; margin-bottom:15px; }
        .risk-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap:15px; margin-bottom:30px; }
        .risk-card { background:#2a2a2a; border:1px solid #444; border-radius:10px; padding:20px; text-align:center; }
        .risk-card .risk-number { font-size:32px; font-weight:bold; }
        .risk-low { color:#4cff8d; }
        .risk-medium { color:#ffa500; }
        .risk-high { color:#ff4c4c; }
        .risk-card .risk-label { color:#aaa; font-size:14px; margin-top:5px; }
        .disease-list { list-style:none; padding:0; }
        .disease-list li { padding:8px; border-bottom:1px solid #333; display:flex; justify-content:space-between; }
        .disease-list .disease-name { color:#4cff8d; }
        .disease-list .disease-count { color:#aaa; }
        @media (max-width:768px) { .charts-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <span style="color:#4cff8d; font-weight:bold;">🩺 MedInNowhere ۳.۱</span>
        <div>
            <a href="/">🏠 خانه</a>
            <a href="/patient">👤 بیمار</a>
            <a href="/dashboard" style="color:#4cff8d;">📊 داشبورد</a>
            <a href="/chat">💬 چت</a>
            <a href="/profile">👤 پروفایل</a>
            <a href="/history">📋 تاریخچه</a>
            <a href="/logout">🚪 خروج</a>
        </div>
    </nav>
    
    <div class="container">
        <h1>📊 داشبورد سلامت</h1>
        
        <!-- کارت‌های آمار -->
        <div class="stats-grid" id="statsCards"></div>
        
        <!-- نمودارها -->
        <div class="charts-grid">
            <div class="chart-card">
                <h3>📈 تشخیص‌های ماهانه (۶ ماه اخیر)</h3>
                <canvas id="monthlyChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>⚠️ توزیع سطح اورژانس</h3>
                <canvas id="urgencyChart"></canvas>
            </div>
        </div>
        
        <!-- Risk Score -->
        <h2 style="color:#4cff8d; margin-bottom:15px;">🎯 ارزیابی خطر بیماری‌های مزمن (Risk Score)</h2>
        <div class="risk-grid" id="riskScores"></div>
        
        <!-- بیماری‌های شایع -->
        <div class="chart-card" style="margin-top:20px;">
            <h3>🔝 شایع‌ترین تشخیص‌ها</h3>
            <ul class="disease-list" id="topDiseases"></ul>
        </div>
    </div>

    <script>
        let monthlyChart, urgencyChart;
        
        async function loadDashboard() {
            const resp = await fetch('/api/dashboard/stats');
            const data = await resp.json();
            
            // کارت‌های آمار
            document.getElementById('statsCards').innerHTML = `
                <div class="stat-card"><div class="number">${data.total_diagnoses}</div><div class="label">کل تشخیص‌ها</div></div>
                <div class="stat-card"><div class="number">${data.recent_diagnoses}</div><div class="label">تشخیص‌های ۳۰ روز اخیر</div></div>
                <div class="stat-card"><div class="number">${data.urgency_distribution['بالا']||0}</div><div class="label">موارد اورژانس بالا</div></div>
                <div class="stat-card"><div class="number">${data.top_diseases.length}</div><div class="label">بیماری شایع</div></div>
            `;
            
            // نمودار ماهانه
            if (monthlyChart) monthlyChart.destroy();
            const monthlyCtx = document.getElementById('monthlyChart').getContext('2d');
            monthlyChart = new Chart(monthlyCtx, {
                type: 'bar',
                data: {
                    labels: data.monthly_diagnoses.map(m => m.month),
                    datasets: [{
                        label: 'تعداد تشخیص',
                        data: data.monthly_diagnoses.map(m => m.count),
                        backgroundColor: '#4cff8d',
                        borderColor: '#3adb76',
                        borderWidth: 1
                    }]
                },
                options: { responsive: true, scales: { y: { beginAtZero: true, ticks: { color: '#aaa' } }, x: { ticks: { color: '#aaa' } } }, plugins: { legend: { labels: { color: '#e0e0e0' } } } }
            });
            
            // نمودار اورژانس
            if (urgencyChart) urgencyChart.destroy();
            const urgencyCtx = document.getElementById('urgencyChart').getContext('2d');
            urgencyChart = new Chart(urgencyCtx, {
                type: 'doughnut',
                data: {
                    labels: ['کم', 'متوسط', 'بالا'],
                    datasets: [{
                        data: [data.urgency_distribution['کم']||0, data.urgency_distribution['متوسط']||0, data.urgency_distribution['بالا']||0],
                        backgroundColor: ['#4cff8d', '#ffa500', '#ff4c4c'],
                        borderWidth: 0
                    }]
                },
                options: { responsive: true, plugins: { legend: { labels: { color: '#e0e0e0' } } } }
            });
            
            // Risk Scores
            const rs = data.risk_scores;
            document.getElementById('riskScores').innerHTML = `
                <div class="risk-card"><div class="risk-number ${rs.diabetes > 50 ? 'risk-high' : rs.diabetes > 25 ? 'risk-medium' : 'risk-low'}">${rs.diabetes}%</div><div class="risk-label">خطر دیابت</div></div>
                <div class="risk-card"><div class="risk-number ${rs.hypertension > 50 ? 'risk-high' : rs.hypertension > 25 ? 'risk-medium' : 'risk-low'}">${rs.hypertension}%</div><div class="risk-label">خطر فشار خون</div></div>
                <div class="risk-card"><div class="risk-number ${rs.osteoarthritis > 50 ? 'risk-high' : rs.osteoarthritis > 25 ? 'risk-medium' : 'risk-low'}">${rs.osteoarthritis}%</div><div class="risk-label">خطر آرتروز</div></div>
                <div class="risk-card"><div class="risk-number ${rs.cardiovascular > 50 ? 'risk-high' : rs.cardiovascular > 25 ? 'risk-medium' : 'risk-low'}">${rs.cardiovascular}%</div><div class="risk-label">خطر قلبی-عروقی</div></div>
            `;
            
            // بیماری‌های شایع
            document.getElementById('topDiseases').innerHTML = data.top_diseases.map((d, i) => `
                <li><span class="disease-name">${i+1}. ${d.name}</span><span class="disease-count">${d.count} بار</span></li>
            `).join('');
        }
        
        loadDashboard();
    </script>
</body>
</html>
