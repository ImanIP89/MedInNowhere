<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedInNowhere ۳.۱ | پنل امنیتی</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#4cff8d">
    <style>
        body { background: #1e1e1e; color: #e0e0e0; font-family: Tahoma; margin: 0; }
        .navbar { background:#121212; padding:15px 30px; display:flex; justify-content:space-between; border-bottom:1px solid #444; }
        .navbar a { color:#ccc; text-decoration:none; margin-left:20px; }
        .navbar a:hover { color:#4cff8d; }
        .container { max-width:1200px; margin:40px auto; padding:20px; }
        h1 { color:#4cff8d; }
        table { width:100%; border-collapse:collapse; margin-top:20px; }
        th { background:#121212; color:#4cff8d; padding:10px; text-align:right; }
        td { padding:10px; border-bottom:1px solid #333; }
        .severity-low { color:#4cff8d; }
        .severity-medium { color:#ffa500; }
        .severity-high { color:#ff4c4c; }
        .severity-critical { color:#ff0000; font-weight:bold; }
        .alert-row:hover { background:#2a2a2a; }
        .stats { display:flex; gap:20px; margin-bottom:20px; }
        .stat-card { background:#2a2a2a; border:1px solid #444; border-radius:10px; padding:20px; flex:1; text-align:center; }
        .stat-card .number { font-size:36px; color:#4cff8d; }
        .stat-card .label { color:#aaa; font-size:14px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <span style="color:#4cff8d; font-weight:bold;">🛡️ MedInNowhere Guardian</span>
        <div>
            <a href="/">🏠 خانه</a>
            {% if session.user_role in ('doctor', 'admin') %}
                <a href="/terminal">💻 ترمینال</a>
                <a href="/referrals">📋 ارجاع‌ها</a>
                {% if session.user_role == 'admin' %}
                    <a href="/security" style="color:#4cff8d;">🛡️ امنیت</a>
                {% endif %}
            {% endif %}
            <a href="/patient">👤 بیمار</a>
            <a href="/chat">💬 چت</a>
            <a href="/profile">👤 پروفایل</a>
            <a href="/logout">🚪 خروج</a>
        </div>
    </nav>
    <div class="container">
        <h1>🛡️ پنل مانیتورینگ امنیتی</h1>
        
        <div class="stats" id="stats"></div>
        
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>زمان</th>
                    <th>نوع</th>
                    <th>IP</th>
                    <th>کاربر</th>
                    <th>جزئیات</th>
                    <th>سطح</th>
                </tr>
            </thead>
            <tbody id="alertsTable"></tbody>
        </table>
    </div>

    <script>
        async function loadAlerts() {
            const resp = await fetch('/api/security/alerts');
            const alerts = await resp.json();
            
            // آمار
            const total = alerts.length;
            const bruteForce = alerts.filter(a => a.alert_type === 'brute_force').length;
            const sqlInjection = alerts.filter(a => a.alert_type === 'sql_injection').length;
            const csrf = alerts.filter(a => a.alert_type === 'csrf_fail').length;
            
            document.getElementById('stats').innerHTML = `
                <div class="stat-card"><div class="number">${total}</div><div class="label">کل هشدارها</div></div>
                <div class="stat-card"><div class="number">${bruteForce}</div><div class="label">Brute Force</div></div>
                <div class="stat-card"><div class="number">${sqlInjection}</div><div class="label">SQL Injection</div></div>
                <div class="stat-card"><div class="number">${csrf}</div><div class="label">CSRF Fail</div></div>
            `;
            
            // جدول
            const tbody = document.getElementById('alertsTable');
            tbody.innerHTML = alerts.map((a, i) => `
                <tr class="alert-row">
                    <td>${i+1}</td>
                    <td>${a.created_at}</td>
                    <td>${a.alert_type}</td>
                    <td>${a.ip_address||'-'}</td>
                    <td>${a.username||'-'}</td>
                    <td>${a.details||'-'}</td>
                    <td class="severity-${a.severity}">${a.severity}</td>
                </tr>
            `).join('');
        }
        
        loadAlerts();
        setInterval(loadAlerts, 10000); // هر ۱۰ ثانیه بروز بشه
    </script>
</body>
</html>
