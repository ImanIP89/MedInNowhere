<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نسخه‌های من | MedInNowhere ۳.۱</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#4cff8d">
    <style>
        body { background: #1e1e1e; color: #e0e0e0; font-family: Tahoma; margin: 0; }
        .navbar { background:#121212; padding:15px 30px; display:flex; justify-content:space-between; border-bottom:1px solid #444; }
        .navbar a { color:#ccc; text-decoration:none; margin-left:20px; }
        .navbar a:hover { color:#4cff8d; }
        .container { max-width:800px; margin:40px auto; padding:20px; }
        h1 { color:#4cff8d; }
        .prescription-card {
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .prescription-card .drug { color: #4cff8d; font-weight: bold; font-size: 18px; }
        .prescription-card .details { color: #aaa; margin-top: 5px; }
        .prescription-card .status { display: inline-block; padding: 2px 10px; border-radius: 5px; font-size: 12px; margin-top: 10px; }
        .active { background: #4cff8d; color: #000; }
        .inactive { background: #ff4c4c; color: #fff; }
    </style>
</head>
<body>
    <nav class="navbar">
        <span style="color:#4cff8d; font-weight:bold;">🩺 MedInNowhere ۳.۱</span>
        <div>
            <a href="/">🏠 خانه</a>
            <a href="/patient">👤 بیمار</a>
            <a href="/prescriptions" style="color:#4cff8d;">💊 نسخه‌ها</a>
            <a href="/profile">👤 پروفایل</a>
            <a href="/logout">🚪 خروج</a>
        </div>
    </nav>
    <div class="container">
        <h1>💊 نسخه‌های من</h1>
        <div id="prescriptionsList"></div>
    </div>

    <script>
        async function loadPrescriptions() {
            const resp = await fetch('/api/prescriptions');
            const data = await resp.json();
            const container = document.getElementById('prescriptionsList');
            if (data.length === 0) {
                container.innerHTML = '<p style="color:#aaa;">نسخه‌ای ثبت نشده است.</p>';
                return;
            }
            container.innerHTML = data.map(p => `
                <div class="prescription-card">
                    <div class="drug">💊 ${p.medication_name}</div>
                    <div class="details">دوز: ${p.dosage || 'تعیین نشده'}</div>
                    <div class="details">دستورات: ${p.instructions || 'ندارد'}</div>
                    <div class="details">پزشک: ${p.doctor_name || 'نامشخص'} | تاریخ: ${p.created_at}</div>
                    <div class="status ${p.status}">${p.status === 'active' ? 'فعال' : 'غیرفعال'}</div>
                </div>
            `).join('');
        }
        loadPrescriptions();
    </script>
</body>
</html>
